# Train project 와 같이 돌리기 때문에 port를 다르게 설정 
services:

  # ── Kafka (KRaft 모드) ─────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: hospital-kafka
    ports:
      - "9093:9092"
      - "9092:9092"
    env_file:
      - .env
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - hospital-network
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: hospital-postgres
    ports:
      - "5434:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hospital-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spark Master ───────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: hospital-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8083:8080" # Spark Web UI
      - "7078:7077" # Spark Master
      - "4041:4040" # Spark Jobs UI
    volumes:
      - ./spark:/opt/spark/apps
    networks:
      - hospital-network

  # ── Spark Worker ───────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.0
    container_name: hospital-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2G # 1G → 2G (Worker Lost 에러 방지)
      - SPARK_WORKER_CORES=2 # 1->2
    volumes:
      - ./spark:/opt/spark/apps
    depends_on:
      - spark-master
    networks:
      - hospital-network

  # ── Superset ───────────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: hospital-superset
    env_file:
      - .env
    ports:
      - "8089:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - MAPBOX_API_KEY=${MAPBOX_API_KEY}
      - ./superset_config.py:/app/superset/pythonpath/superset_config.py
      - SUPERSET_FEATURE_ENABLE_JAVASCRIPT_CONTROLS=true
    volumes:
      - superset_data:/app/superset_home
    networks:
      - hospital-network
    depends_on:
      - postgres

  # ── Airflow ────────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.9.1
    container_name: hospital-airflow
    depends_on:
      - postgres
      - kafka
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AIRFLOW__SMTP__SMTP_HOST: 'smtp.gmail.com'
      AIRFLOW__SMTP__SMTP_STARTTLS: 'True'
      AIRFLOW__SMTP__SMTP_SSL: 'False'
      AIRFLOW__SMTP__SMTP_PORT: '587'
      AIRFLOW__SMTP__SMTP_USER: ${AIRFLOW_SMTP_USER}
      AIRFLOW__SMTP__SMTP_PASSWORD: ${AIRFLOW_SMTP_PASSWORD}
      AIRFLOW__SMTP__SMTP_MAIL_FROM: ${AIRFLOW_SMTP_USER}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./producer:/opt/airflow/producer
    ports:
      - "8084:8080"
    networks:
      - hospital-network
    command: >
      bash -c "
        pip3 install kafka-python requests &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true &&
        airflow scheduler &
        airflow webserver
      "

volumes:
  kafka_data:
  postgres_data:
  superset_data:


networks:
  hospital-network:
    driver: bridge
